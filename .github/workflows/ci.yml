name: Healthcare App CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── JOB 1: Lint ───────────────────────────────
  lint:
    name: 🧹 Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: Frontend
        run: npm install

      - name: 🧹 Run ESLint
        working-directory: Frontend
        run: npm run lint

  # ─── JOB 2: Tests ──────────────────────────────
  test:
    name: 🧪 Healthcare Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'      # ← CHANGED from 18 to 20
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: Frontend
        run: npm install

      - name: 🧪 Run tests
        working-directory: Frontend
        run: npm test

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Frontend/test-results/

  # ─── JOB 3: Build ──────────────────────────────
  build:
    name: 🏗️ Build App
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'      # ← CHANGED to 20 for consistency
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: Frontend
        run: npm install

      - name: 🔨 Build React app
        working-directory: Frontend
        run: npm run build

      - name: ✅ Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: Frontend/dist

  # ─── JOB 4: Docker ─────────────────────────────
  docker:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Set up Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/healthnest-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: 🐳 Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}