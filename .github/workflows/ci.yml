name: Healthcare App CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: 🏗️ Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: Frontend
        run: npm install

      - name: 🔨 Build React app
        working-directory: Frontend
        run: npm run build

      - name: ✅ Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: Frontend/dist

  docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: docker build -t healthnest-frontend ./Frontend

      - name: 🔍 Verify image was created
        run: docker images | grep healthnest-frontend